services:
  # Obsidian - ports 5440/5010/5180
  postgres-obsidian:
    image: postgres:17
    container_name: runner-db-obsidian
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge
      POSTGRES_DB: skillforge
    ports:
      - "5440:5432"
    volumes:
      - pgdata-obsidian:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-obsidian:
    build:
      context: ./repos/Obsidian/Itenium.SkillForge/backend
      args:
        NUGET_USER: ${GITHUB_USER}
        NUGET_TOKEN: ${GITHUB_TOKEN}
    container_name: runner-backend-obsidian
    restart: on-failure
    ports:
      - "5010:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres-obsidian;Port=5432;Database=skillforge;Username=skillforge;Password=skillforge
    depends_on:
      postgres-obsidian:
        condition: service_healthy

  frontend-obsidian:
    build:
      context: ./repos/Obsidian/Itenium.SkillForge/frontend
      dockerfile: ../../../../Dockerfile.frontend
      args:
        NPM_TOKEN: ${GITHUB_TOKEN}
    container_name: runner-frontend-obsidian
    ports:
      - "5180:5173"
    environment:
      VITE_API_URL: http://localhost:5010
    depends_on:
      - backend-obsidian

